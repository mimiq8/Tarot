<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ロジカル・タロット</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: radial-gradient(ellipse at 22% 12%, #1d0d42 0%, #07050d 52%, #0a1520 100%);
    font-family: 'Zen Old Mincho', serif; color: #e8dcc8; 
    display: flex; flex-direction: column; align-items: center; 
    min-height: 100vh; padding: 40px 20px; overflow-x: hidden;
  }
  .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  
  /* ヘッダー装飾 */
  .header { text-align: center; margin-bottom: 30px; animation: fadeUp 0.8s ease both; }
  .header-eye { font-family: 'Cormorant Garamond', serif; font-size: 10px; letter-spacing: 6px; color: #9b7e4a; margin-bottom: 8px; }
  .header-ttl { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; font-style: italic; color: #e8dcc8; margin-bottom: 6px; }
  .header-ttl em { color: #c9a84c; font-style: normal; }
  .header-rule { width: 80px; height: 1px; margin: 0 auto; background: linear-gradient(to right, transparent, #c9a84c, transparent); }

  /* パネルとボタン */
  .panel { 
    background: rgba(255,255,255,.03); border: 1px solid rgba(201,168,76,.2); 
    border-radius: 16px; padding: 30px 20px; backdrop-filter: blur(10px);
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .mode-desc { text-align: center; font-size: 13px; color: #c9a84c; margin-bottom: 24px; letter-spacing: 1px; }
  .btn-wrap { display: flex; gap: 12px; }
  .btn-mode {
    flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,.4); color: #c9a84c;
    padding: 20px 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .btn-mode:hover { background: rgba(201,168,76,.15); color: #fff; }
  .btn-mode span:first-child { font-family: 'Cormorant Garamond', serif; font-size: 28px; line-height: 1; }
  .btn-mode span:last-child { font-size: 11px; letter-spacing: 2px; }

  /* 鑑定結果エリア */
  .result-card {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,.15);
    border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center;
    animation: fadeUp 0.6s ease both;
  }
  .card-label { font-size: 10px; color: #9b7e4a; letter-spacing: 3px; margin-bottom: 10px; display: inline-block; border: 1px solid #9b7e4a; padding: 2px 10px; border-radius: 20px; }
  .card-img-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
  .card-img { width: 140px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); transition: transform 0.5s; }
  .card-img.reversed { transform: rotate(180deg); }
  .card-name { font-size: 18px; color: #c9a84c; margin-bottom: 8px; }
  .card-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
  .status-up { border: 1px solid #90d890; color: #90d890; background: rgba(40,100,60,.2); }
  .status-rev { border: 1px solid #c890e8; color: #c890e8; background: rgba(120,40,140,.2); }
  .card-text { font-size: 13px; color: #d0c0b0; line-height: 2; text-align: left; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }

  /* LINE誘導エリア */
  .action-area { margin-top: 30px; animation: fadeUp 0.8s ease both; }
  textarea {
    width: 100%; height: 90px; background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,.3);
    color: #fff; padding: 15px; border-radius: 10px; font-family: inherit; font-size: 13px;
    resize: none; outline: none; margin-bottom: 15px;
  }
  textarea:focus { border-color: #c9a84c; }
  .btn-line {
    width: 100%; background: #06C755; color: #fff; border: none; padding: 18px;
    border-radius: 12px; font-size: 15px; font-weight: bold; letter-spacing: 1px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 8px 20px rgba(6,199,85,.3); transition: all 0.2s;
  }
  .btn-line:hover { background: #05b34c; transform: translateY(-2px); }
  .btn-reset {
    background: none; border: none; color: #887a92; font-family: inherit; font-size: 11px;
    margin: 20px auto 0; display: block; cursor: pointer; letter-spacing: 2px;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  /* 背景の星屑エフェクト */
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="20" cy="20" r="1" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="300" cy="250" r="1" fill="white" opacity="0.2"/><circle cx="80" cy="320" r="2" fill="white" opacity="0.4"/></svg>') repeat; }
</style>
</head>
<body>

<div class="stars"></div>

<div class="container">
  <header class="header">
    <div class="header-eye">✦ LOGICAL TAROT ✦</div>
    <h1 class="header-ttl">AI <em>タロット</em></h1>
    <div class="header-rule"></div>
  </header>

  <div class="panel" id="main-panel">
    <p class="mode-desc">「今、ここ」の直感を言語化しませんか？</p>
    <div class="btn-wrap">
      <button class="btn-mode" onclick="drawCards(1)">
        <span>I</span><span>一枚引き</span>
      </button>
      <button class="btn-mode" onclick="drawCards(3)">
        <span>III</span><span>三枚引き</span>
      </button>
    </div>
  </div>
</div>

// --- 逆位置のメッセージ ---
const REVERSED_TEXTS = {
  fool: "準備不足や無謀さへの警告です。今一度、足元を確かめてから踏み出してみましょう。",
  world: "完成間近ですが、何かが未完のままです。焦らず最後の仕上げに丁寧に向き合って。",
  // 他のカード分もここに追加
};

// 2. 鑑定ロジック
window.drawCards = function(count) {
  // メインパネルのボタンを非表示にする
  const panel = document.getElementById("main-panel");
  
  // シャッフル処理
  const shuffled = [...CARDS];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  
  // 指定枚数引く
  const picked = shuffled.slice(0, count);
  let html = "";

  // 引いたカードごとにHTMLを生成
  picked.forEach((c, i) => {
    // 30%の確率で逆位置
    const isReversed = Math.random() < 0.3;
    const label = count === 3 ? ['過去', '現在', '未来'][i] : '鑑定結果';
    const statusClass = isReversed ? "status-rev" : "status-up";
    const statusText = isReversed ? "逆位置" : "正位置";
    const imgClass = isReversed ? "card-img reversed" : "card-img";
    const msg = isReversed ? (c.reversed || REVERSED_TEXTS[c.id] || "内省の時です。") : c.positive;

    html += `
      <div class="result-card">
        <span class="card-label">${label}</span>
        <div class="card-img-wrap">
          <img src="${c.image}" class="${imgClass}" alt="${c.name}">
        </div>
        <div class="card-status ${statusClass}">${statusText}</div>
        <h2 class="card-name">${c.name} <span style="font-size:12px;color:#9b7e4a;">${c.nameEn}</span></h2>
        <p class="card-text">${msg}</p>
      </div>
    `;
  });

  // LINE相談エリアを追加
  html += `
    <div class="action-area">
      <textarea id="user-memo" placeholder="Q. この結果を見て、心当たりがあることは何ですか？"></textarea>
      <button class="btn-line" onclick="sendToLine(${count})">
        公式LINEで相談を開始
      </button>
      <p style="font-size:10px; color:#6a5a72; text-align:center; margin-top:8px;">※結果がコピーされます。LINEにそのまま貼り付けてください。</p>
      <button class="btn-reset" onclick="location.reload()">最初に戻る</button>
    </div>
  `;

  // 画面を更新
  panel.innerHTML = html;
  
  // グローバルに引いたカードを保存（LINE送信用）
  window.currentDrawnCards = picked.map(c => `${c.name}${c.isReversed ? '（逆）' : ''}`);
};

// 3. LINE送信ロジック
window.sendToLine = function(count) {
  const memo = document.getElementById("user-memo").value || "特になし";
  const cardNames = window.currentDrawnCards.join(" / ");
  const modeText = count === 1 ? "1枚引き" : "3枚引き";
  
  const text = `【AIタロット鑑定結果】\nモード：${modeText}\nカード：${cardNames}\n私の気づき：${memo}\n\nこれについて詳しく相談したいです。`;
  
  navigator.clipboard.writeText(text).then(() => {
    // あなたの公式LINEのURLに変更してください
    window.open('https://line.me/R/ti/p/@YOUR_LINE_ID', '_blank');
  }).catch(err => {
    alert("コピーに失敗しました。お手数ですが手動でコピーしてください。");
  });
};
</script>
