<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ロジカル・タロット</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Old Mincho', serif; color: #e8dcc8; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; overflow-x: hidden; transition: background 1.5s ease; }
  body.theme-default { background: radial-gradient(ellipse at 22% 12%, #1d0d42 0%, #07050d 52%, #0a1520 100%); }
  body.theme-past    { background: radial-gradient(ellipse at 22% 12%, #0f172a 0%, #020617 52%, #000000 100%); }
  body.theme-present { background: radial-gradient(ellipse at 22% 12%, #422006 0%, #1a0d00 52%, #000000 100%); }
  body.theme-future  { background: radial-gradient(ellipse at 22% 12%, #3b0764 0%, #170229 52%, #000000 100%); }
  .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 30px; animation: fadeUp 0.8s ease both; }
  .header-eye { font-family: 'Cormorant Garamond', serif; font-size: 10px; letter-spacing: 6px; color: #9b7e4a; margin-bottom: 8px; }
  .header-ttl { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; font-style: italic; color: #e8dcc8; margin-bottom: 6px; }
  .header-ttl em { color: #c9a84c; font-style: normal; }
  .header-rule { width: 80px; height: 1px; margin: 0 auto; background: linear-gradient(to right, transparent, #c9a84c, transparent); }
  .panel { background: rgba(255,255,255,.03); border: 1px solid rgba(201,168,76,.2); border-radius: 16px; padding: 30px 20px; backdrop-filter: blur(10px); animation: fadeUp 0.5s 0.2s ease both; width: 100%; }
  .mode-desc { text-align: center; font-size: 13px; color: #c9a84c; margin-bottom: 24px; letter-spacing: 1px; }
  /* 23行目から書き換え */
.btn-wrap {
  display: grid;
  /* 画面幅に合わせて、1列か2列か自動で判断させる設定 */
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  width: 100%;
  justify-content: center;
}

/* ボタン（mode-row）自体の設定も少し整理 */
.mode-row {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 100%;
  cursor: pointer;
  transition: all 0.3s;
  padding: 15px; /* 少し広めに */
  border-radius: 12px;
  background: rgba(255,255,255,0.05); /* 少し見やすく */
  border: 1px solid rgba(201,168,76,0.2);
  text-align: left;
  color: inherit;
  font-family: inherit;
  outline: none;
}
  @media (hover: hover) { .mode-row:hover { background: rgba(201,168,76,0.1); transform: translateX(5px); } }
  .mode-row:active { background: rgba(201,168,76,0.2); transform: scale(0.98); }
  .mode-row * { pointer-events: none; }
  .btn-mode-rect { width: 60px; height: 60px; min-width: 60px; background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,0.4); color: #c9a84c; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .btn-mode-rect span { font-family: 'Cormorant Garamond', serif; font-size: 24px; }
  .mode-info { display: flex; flex-direction: column; justify-content: center; text-align: left; }
  .mode-name { font-size: 16px; color: #e8dcc8; font-weight: bold; margin-bottom: 4px; }
  .mode-text { font-size: 11px; color: #9b7e4a; line-height: 1.4; }
  .category-wrap { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; animation: fadeUp 0.6s ease both; }
  .btn-category { background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,.4); color: #e8dcc8; padding: 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s; text-align: left; font-family: inherit; font-size: 14px; }
  .btn-category:hover { background: rgba(201,168,76,.15); border-color: #c9a84c; transform: translateX(5px); }
  .btn-category span { display: block; font-size: 10px; color: #9b7e4a; margin-top: 4px; }
  .pre-memo-wrap { animation: fadeUp 0.6s ease both; text-align: center; width: 100%; }
  .btn-next { background: linear-gradient(135deg, #c9a84c, #9b7e4a); color: #1a0d00; border: none; padding: 15px 30px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 10px; font-family: inherit; letter-spacing: 1px; width: 100%; }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201,168,76,0.4); }
  .selection-guide { text-align: center; margin-bottom: 20px; color: #e8dcc8; font-size: 15px; font-weight: bold; letter-spacing: 1px; animation: fadeUp 0.4s ease both; min-height: 24px; transition: color 0.5s; }
  .spread-area { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; min-height: 160px; animation: fadeUp 0.6s ease both; }
  .slot-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .slot-label { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #6a5a72; letter-spacing: 2px; text-align: center; line-height: 1.3; transition: all 0.5s; }
  .slot-label.active-label { color: #e8dcc8; text-shadow: 0 0 10px rgba(232,220,200,0.8); transform: scale(1.05); }
  .slot-label-jp { font-family: 'Zen Old Mincho', serif; font-size: 11px; color: #c9a84c; display: block; }
  .card-slot { width: 80px; height: 120px; border: 2px dashed rgba(201,168,76,0.3); border-radius: 6px; position: relative; transition: all 0.5s; }
  .card-slot.active { border-color: rgba(201,168,76,1); box-shadow: 0 0 15px rgba(201,168,76,0.4) inset; transform: translateY(-5px); }
  .card-slot.filled { border-style: solid; border-color: rgba(201,168,76,0.6); background: linear-gradient(135deg, #1d0d42, #3b1d6b); background-image: repeating-linear-gradient(45deg, rgba(201,168,76,0.1) 0, rgba(201,168,76,0.1) 2px, transparent 2px, transparent 6px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateY(0); }
  ./* 山札エリアを「扇の土台」にする */
.card-deck {
  position: relative;
  width: 100%;
  height: 140px;      /* 段数を増やして高さを圧縮 */
  margin-top: 150px;  /* スロットからさらに遠ざける（100px→150px） */
  display: flex;
  justify-content: center;
  perspective: 1000px;
}

/* カードの共通設定 */
.card-back {
  position: absolute;
  bottom: 0;
  left: 50%;
  margin-left: -24px; /* 幅の半分 */
  
  width: 48px;        /* わずかにスリム化 */
  height: 75px;       /* わずかにコンパクト化 */
  background-color: #1d0d42;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M10 0 L20 10 L10 20 L0 10 Z" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/><circle cx="10" cy="10" r="1" fill="rgba(201,168,76,0.2)"/></svg>');
  background-size: 20px 20px;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 6px;
  cursor: pointer;
  /* 揺れ・ガタつき防止のため transition を cubic-bezier に最適化 */
  transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1), box-shadow 0.3s, opacity 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.5);
  transform-origin: center 200%; /* 回転軸を遠くして扇を緩やかに */
  flex-shrink: 0;
  backface-visibility: hidden;  /* チラつき防止 */
}

/* 扇形の計算ロジック（8枚×3段構成用） */
.card-back.fan-style {
  /* 段の間隔を35pxに詰める */
  --row-offset: calc(var(--row) * 35px); 
  /* 8枚の中央(3.5)を基準に角度と左右幅を計算 */
  --angle: calc((var(--i) - 3.5) * 7deg); 
  --x-offset: calc((var(--i) - 3.5) * 20px);

  transform: translateX(var(--x-offset)) translateY(calc(-1 * var(--row-offset))) rotate(var(--angle));
}

.card-back:hover {
  z-index: 100 !important;
  /* ホバー時は上にスッと浮かせる */
  transform: translateX(var(--x-offset)) translateY(calc(-1 * var(--row-offset) - 25px)) rotate(var(--angle)) scale(1.1);
  border-color: #c9a84c;
  box-shadow: 0 10px 20px rgba(201,168,76,0.4);
}

.card-back.selected {
  opacity: 0;
  transform: translateY(-200px) scale(0.4) rotate(0deg);
  pointer-events: none;
}


  .result-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,.15); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; animation: fadeUp 0.6s ease both; }
  .card-label { font-size: 10px; color: #9b7e4a; letter-spacing: 3px; margin-bottom: 10px; display: inline-block; border: 1px solid #9b7e4a; padding: 2px 10px; border-radius: 20px; }
  .card-img-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
  .card-img { width: 140px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); transition: transform 0.5s; }
  .card-img.reversed { transform: rotate(180deg); }
  .card-name { font-size: 18px; color: #c9a84c; margin-bottom: 8px; }
  .card-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
  .status-up { border: 1px solid #90d890; color: #90d890; background: rgba(40,100,60,.2); }
  .status-rev { border: 1px solid #c890e8; color: #c890e8; background: rgba(120,40,140,.2); }
  .card-text { font-size: 13px; color: #d0c0b0; line-height: 2; text-align: left; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
  .action-area { margin-top: 30px; animation: fadeUp 0.8s ease both; width: 100%; }
  .btn-line { width: 100%; background: #06C755; color: #fff; border: none; padding: 18px; border-radius: 12px; font-size: 15px; font-weight: bold; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(6,199,85,.3); transition: all 0.2s; margin-top: 15px; }
  .btn-line:hover { background: #05b34c; transform: translateY(-2px); }
  .btn-reset { background: none; border: none; color: #887a92; font-family: inherit; font-size: 11px; margin: 20px auto 0; display: block; cursor: pointer; letter-spacing: 2px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="20" cy="20" r="1" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="300" cy="250" r="1" fill="white" opacity="0.2"/><circle cx="80" cy="320" r="2" fill="white" opacity="0.4"/></svg>') repeat; }
/* 4枚引きの時だけ、スロットを十字型に配置する */
.spread-area:has(.slot-wrapper:nth-child(4)) {
  display: grid !important;
  grid-template-areas: 
    ". top ."
    "left . right"
    ". bottom .";
  gap: 15px;
  justify-content: center;
  align-items: center;
  min-height: 400px;
}

.spread-area:has(.slot-wrapper:nth-child(4)) .slot-wrapper:nth-child(1) { grid-area: left; }
.spread-area:has(.slot-wrapper:nth-child(4)) .slot-wrapper:nth-child(2) { grid-area: right; }
.spread-area:has(.slot-wrapper:nth-child(4)) .slot-wrapper:nth-child(3) { grid-area: bottom; }
.spread-area:has(.slot-wrapper:nth-child(4)) .slot-wrapper:nth-child(4) { grid-area: top; }

</style>

  }

  const panel = document.getElementById("main-panel");
  let html = '<div class="selection-guide">今日はどの領域をスキャンしますか？</div><div class="category-wrap">';
  const cats = [
    ["今の仕事、どうなの？","（現状分析・キャリア）"],
    ["お金との向き合い方を知りたい","（豊かさの思考・整理）"],
    ["あの人との関係は？","（対人関係・心理）"],
    ["あなたの知らない強み、気になりませんか？","（自己理解・才能）"],
    ["とりあえず聞いて！","（自由入力・総合）"]
  ];
  
  cats.forEach(function(c) { 
    html += '<button class="btn-category" onclick="window.selectCategory(this.dataset.cat)" data-cat="' + c[0].replace(/"/g,'&quot;') + '">' + c[0] + '<span>' + c[1] + '</span></button>'; 
  });
  
  html += '</div>';
  panel.innerHTML = html;
};


window.selectCategory = function(category) {
  window.selectedCategory = category;
  const panel = document.getElementById("main-panel");
  panel.innerHTML = '<div class="selection-guide" style="font-size:14px;line-height:1.6;margin-bottom:15px;">「' + category + '」ですね。<br>そのことについて、今頭にあることを少しだけ書き出してみてください。</div><div class="pre-memo-wrap"><textarea id="pre-memo-input" style="height:100px;background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,.3);color:#fff;width:100%;padding:15px;border-radius:10px;font-family:inherit;font-size:13px;resize:none;outline:none;" placeholder="言語化することで、カードの精度が上がります。（書かずに進むこともできます）"></textarea><button class="btn-next" onclick="window.proceedToDeck()">直感でカードを引く</button></div>';
};

window.showTwoChoiceInput = function() {
  const panel = document.getElementById("main-panel");
  panel.innerHTML = '<div class="selection-guide" style="font-size:14px;line-height:1.6;margin-bottom:15px;">「二者択一」ですね。<br>迷っている2つの選択肢を書き出してください。</div><div class="pre-memo-wrap" style="display:flex;flex-direction:column;gap:12px;"><input type="text" id="choice-a-input" placeholder="選択肢A（例：今の会社に残る）" style="width:100%;padding:15px;background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,.5);color:#fff;border-radius:8px;outline:none;font-family:inherit;"><input type="text" id="choice-b-input" placeholder="選択肢B（例：思い切って転職する）" style="width:100%;padding:15px;background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,.5);color:#fff;border-radius:8px;outline:none;font-family:inherit;"><textarea id="pre-memo-input" style="height:60px;background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,.3);color:#fff;width:100%;padding:10px;border-radius:8px;font-family:inherit;font-size:12px;resize:none;outline:none;" placeholder="その他、率直な思いがあれば（任意）"></textarea><button class="btn-next" onclick="window.proceedToDeck()">直感でカードを引く</button></div>';
};

window.proceedToDeck = function() {
  var m = document.getElementById("pre-memo-input");
  window.preMemo = m ? m.value : "";
  if (window.requiredCount === 2) {
    var a = document.getElementById("choice-a-input"), b = document.getElementById("choice-b-input");
    window.choiceA = (a && a.value) ? a.value : "選択肢A";
    window.choiceB = (b && b.value) ? b.value : "選択肢B";
  }
  window.selectedCards = [];
  window.shuffledDeck = CARDS.slice().sort(function() { return Math.random() - 0.5; });
  var panel = document.getElementById("main-panel");
  var html = '<div class="selection-guide" id="selection-guide"></div><div class="spread-area" id="spread-area">';
  
  // --- ラベル定義 ---
  var lbs;
  if (window.requiredCount === 4) {
    lbs = [
      {jp:"あなたの気持ち",en:"YOUR MIND"},
      {jp:"相手の気持ち",en:"THEIR MIND"},
      {jp:"二人の状況",en:"CURRENT STATUS"},
      {jp:"二人の未来",en:"FUTURE OUTLOOK"}
    ];
  } else if (window.requiredCount === 3) {
    lbs = [{jp:"過去",en:"PAST"},{jp:"現在",en:"PRESENT"},{jp:"未来",en:"FUTURE"}];
  } else if (window.requiredCount === 2) {
    lbs = [{jp:"選択肢A",en:"OPTION A"},{jp:"選択肢B",en:"OPTION B"}];
  } else {
    lbs = [{jp:"鑑定結果",en:"RESULT"}];
  }

  for (var i = 0; i < lbs.length; i++) {
    var n = (window.requiredCount >= 3) ? (["I","II","III","IV"][i] + ". ") : "";
    html += '<div class="slot-wrapper"><div class="slot-label" id="label-' + i + '">' + n + lbs[i].en + '<span class="slot-label-jp">' + lbs[i].jp + '</span></div><div class="card-slot" id="slot-' + i + '"></div></div>';
  }

  // --- カード展開エリア（8枚×3段ロジックへ変更） ---
  html += '</div><div class="card-deck" id="card-deck">';
  for (var j = 0; j < CARDS.length; j++) {
    // 8枚ごとに段（row）を分けることで、11-11の2段から 8-8-6の3段へ
    var row = Math.floor(j / 8); 
    var indexInRow = j % 8;
    
    // style属性に3段対応の背番号を注入します
    html += '<div class="card-back fan-style" id="card-' + j + '" ' +
            'style="--i:' + indexInRow + '; --row:' + row + ';" ' +
            'onclick="window.selectCard(' + j + ')"></div>';
  }
  html += '</div>';

  
  panel.innerHTML = html;
  window.updateSelectionUI();
};


window.updateSelectionUI = function() {
  var step = window.selectedCards.length;
  var guide = document.getElementById("selection-guide");
  document.body.className = "";
  if (step === window.requiredCount) {
    if (guide) guide.innerHTML = "運命が定まりました。結果をオープンします...";
    document.body.classList.add("theme-future");
    return;
  }
  for (var i = 0; i < window.requiredCount; i++) {
    var s = document.getElementById("slot-" + i);
    var l = document.getElementById("label-" + i);
    if (i === step) {
      if (s) s.classList.add("active");
      if (l) l.classList.add("active-label");
    } else {
      if (s) s.classList.remove("active");
      if (l) l.classList.remove("active-label");
    }
  }
  if (!guide) return;

  // --- 案内文のがっちゃんこ箇所 ---
  if (window.requiredCount === 4) {
    var txts4 = [
      "【1枚目：あなたの気持ち】を引いてください",
      "【2枚目：相手の気持ち】を引いてください",
      "【3枚目：二人の状況】を引いてください",
      "【4枚目：二人の未来】の可能性を引いてください"
    ];
    guide.innerHTML = txts4[step];
    // 背景テーマの切り替え（4枚目は未来テーマを使用）
    document.body.classList.add(["theme-default","theme-past","theme-present","theme-future"][step]);
  } else if (window.requiredCount === 1) {
    guide.innerHTML = "直感でカードを <strong>1枚</strong> 選んでください";
    document.body.classList.add("theme-past");
  } else if (window.requiredCount === 3) {
    var txts3 = ["【1枚目：過去】を決めるカードを選んでください","【2枚目：現在】の状態を表すカードを選んでください","【3枚目：未来】の可能性を示すカードを選んでください"];
    guide.innerHTML = txts3[step];
    document.body.classList.add(["theme-past","theme-present","theme-future"][step]);
  } else if (window.requiredCount === 2) {
    guide.innerHTML = step === 0 ? "【選択肢A】 <strong>" + window.choiceA + "</strong> の行く末を引いてください" : "【選択肢B】 <strong>" + window.choiceB + "</strong> の行く末を引いてください";
    document.body.classList.add(step === 0 ? "theme-past" : "theme-present");
  }
};

// window.selectCard は変更なしでそのまま使えます
window.selectCard = function(idx) {
  var el = document.getElementById("card-" + idx);
  if (!el || el.classList.contains("selected")) return;
  var step = window.selectedCards.length;
  if (step >= window.requiredCount) return;
  el.classList.add("selected");
  var slot = document.getElementById("slot-" + step);
  if (slot) slot.classList.add("filled");
  window.selectedCards.push(window.shuffledDeck[idx]);
  window.updateSelectionUI();
  if (window.selectedCards.length === window.requiredCount) {
    setTimeout(function() { window.showResults(); }, 1200);
  }
};

window.showResults = function() {
  var panel = document.getElementById("main-panel");
  document.body.className = "theme-default";
  var html = "";
  window.currentDrawnCards = [];
  
  for (var i = 0; i < window.selectedCards.length; i++) {
    var c = window.selectedCards[i];
    var isRev = Math.random() < 0.3; 
    
    var lbl;
    if (window.requiredCount === 4) {
      lbl = ["あなたの気持ち", "相手の気持ち", "二人の状況", "二人の未来"][i];
    } else if (window.requiredCount === 3) {
      lbl = ["過去", "現在", "未来"][i];
    } else if (window.requiredCount === 2) {
      lbl = i === 0 ? ("A: " + window.choiceA) : ("B: " + window.choiceB);
    } else {
      lbl = "鑑定結果";
    }

    // --- GPT先生の指摘：データ構造の修正 ---
    // 実データに合わせて .positive と .negative (または逆位置用データ) を参照
    // もし逆位置データが .negative という名前なら以下でOKです
    var msg = isRev ? (c.negative || c.positive) : c.positive;
    var imagePath = c.image; // .img ではなく .image を参照
    // ------------------------------------

    html += '<div class="result-card">' +
              '<div class="card-label">' + lbl + '</div>' +
              '<div class="card-img-wrap"><img src="' + imagePath + '" class="card-img' + (isRev ? ' reversed' : '') + '"></div>' +
              '<div class="card-status ' + (isRev ? 'status-rev' : 'status-up') + '">' + (isRev ? '逆位置' : '正位置') + '</div>' +
              '<h2 class="card-name">' + c.name + ' <span style="font-size:12px;color:#9b7e4a;">' + c.nameEn + '</span></h2>' +
              '<p class="card-text">' + msg + '</p>' +
            '</div>';
    
    window.currentDrawnCards.push(lbl + "：" + c.name + (isRev ? "（逆）" : ""));
  }

  html += '<div class="action-area">' +
            '<textarea id="user-memo" placeholder="Q. この結果を見て、心当たりがあることは何ですか？" style="height:90px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:15px; border-radius:10px; font-family:inherit; font-size:13px;"></textarea>' +
            '<button class="btn-line" onclick="window.sendToLine(' + window.requiredCount + ')">公式LINEで相談を開始</button>' +
            '<button class="btn-reset" onclick="location.reload()">最初に戻る</button>' +
          '</div>';

  panel.innerHTML = html;
};

window.sendToLine = function(cnt) {
  var post = document.getElementById("user-memo").value || "特になし";
  var pre = window.preMemo || "特になし";
  var NL = "\n";
  var text;
  if (cnt === 2) {
    text = "【AIタロット鑑定結果】" + NL + "モード：二者択一" + NL + "[A] " + window.choiceA + NL + "▶ " + window.currentDrawnCards[0] + NL + NL + "[B] " + window.choiceB + NL + "▶ " + window.currentDrawnCards[1] + NL + "事前の思い：" + pre + NL + "私の気づき：" + post + NL + NL + "これについて詳しく相談したいです。";
  } else {
    text = "【AIタロット鑑定結果】" + NL + "モード：" + (cnt === 1 ? "1枚引き" : "3枚引き") + NL + "テーマ：" + window.selectedCategory + NL + "カード：" + window.currentDrawnCards.join(" / ") + NL + "事前の思い：" + pre + NL + "私の気づき：" + post + NL + NL + "これについて詳しく相談したいです。";
  }
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        window.open("https://line.me/R/ti/p/@796tkxeg", "_blank");
      }).catch(function() { window._fallbackCopy(text); });
    } else {
      window._fallbackCopy(text);
    }
  } catch(e) { window._fallbackCopy(text); }
};

window._fallbackCopy = function(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
  window.open("https://line.me/R/ti/p/@796tkxeg", "_blank");
};
