<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ロジカル・タロット</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Zen Old Mincho', serif; color: #e8dcc8; 
    display: flex; flex-direction: column; align-items: center; 
    min-height: 100vh; padding: 40px 20px; overflow-x: hidden;
    transition: background 1.5s ease;
  }
  body.theme-default { background: radial-gradient(ellipse at 22% 12%, #1d0d42 0%, #07050d 52%, #0a1520 100%); }
  body.theme-past    { background: radial-gradient(ellipse at 22% 12%, #0f172a 0%, #020617 52%, #000000 100%); }
  body.theme-present { background: radial-gradient(ellipse at 22% 12%, #422006 0%, #1a0d00 52%, #000000 100%); }
  body.theme-future  { background: radial-gradient(ellipse at 22% 12%, #3b0764 0%, #170229 52%, #000000 100%); }
  .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 30px; animation: fadeUp 0.8s ease both; }
  .header-eye { font-family: 'Cormorant Garamond', serif; font-size: 10px; letter-spacing: 6px; color: #9b7e4a; margin-bottom: 8px; }
  .header-ttl { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; font-style: italic; color: #e8dcc8; margin-bottom: 6px; }
  .header-ttl em { color: #c9a84c; font-style: normal; }
  .header-rule { width: 80px; height: 1px; margin: 0 auto; background: linear-gradient(to right, transparent, #c9a84c, transparent); }
  .panel { 
    background: rgba(255,255,255,.03); border: 1px solid rgba(201,168,76,.2); 
    border-radius: 16px; padding: 30px 20px; backdrop-filter: blur(10px);
    animation: fadeUp 0.5s 0.2s ease both; width: 100%;
  }
  .mode-desc { text-align: center; font-size: 13px; color: #c9a84c; margin-bottom: 24px; letter-spacing: 1px; }
  .btn-wrap { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
  .mode-row {
    display: flex; align-items: center; gap: 15px; width: 100%;
    cursor: pointer; transition: all 0.3s; padding: 10px;
    border-radius: 12px; background: rgba(255,255,255,0.02);
    border: none; text-align: left; color: inherit; font-family: inherit; outline: none;
  }
  @media (hover: hover) { .mode-row:hover { background: rgba(201,168,76,0.1); transform: translateX(5px); } }
  .mode-row:active { background: rgba(201,168,76,0.2); transform: scale(0.98); }
  .mode-row * { pointer-events: none; }
  .btn-mode-rect {
    width: 60px; height: 60px; min-width: 60px; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.4); color: #c9a84c; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-mode-rect span { font-family: 'Cormorant Garamond', serif; font-size: 24px; }
  .mode-info { display: flex; flex-direction: column; justify-content: center; text-align: left; }
  .mode-name { font-size: 16px; color: #e8dcc8; font-weight: bold; margin-bottom: 4px; }
  .mode-text { font-size: 11px; color: #9b7e4a; line-height: 1.4; }
  .category-wrap { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; animation: fadeUp 0.6s ease both; }
  .btn-category {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,.4); color: #e8dcc8;
    padding: 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s;
    text-align: left; font-family: inherit; font-size: 14px;
  }
  .btn-category:hover { background: rgba(201,168,76,.15); border-color: #c9a84c; transform: translateX(5px); }
  .btn-category span { display: block; font-size: 10px; color: #9b7e4a; margin-top: 4px; }
  .pre-memo-wrap { animation: fadeUp 0.6s ease both; text-align: center; width: 100%; }
  .btn-next {
    background: linear-gradient(135deg, #c9a84c, #9b7e4a); color: #1a0d00; border: none; padding: 15px 30px;
    border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s;
    margin-top: 10px; font-family: inherit; letter-spacing: 1px; width: 100%;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201,168,76,0.4); }
  .selection-guide { text-align: center; margin-bottom: 20px; color: #e8dcc8; font-size: 15px; font-weight: bold; letter-spacing: 1px; animation: fadeUp 0.4s ease both; min-height: 24px; transition: color 0.5s; }
  .spread-area { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; min-height: 160px; animation: fadeUp 0.6s ease both; }
  .slot-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .slot-label { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #6a5a72; letter-spacing: 2px; text-align: center; line-height: 1.3; transition: all 0.5s; }
  .slot-label.active-label { color: #e8dcc8; text-shadow: 0 0 10px rgba(232,220,200,0.8); transform: scale(1.05); }
  .slot-label-jp { font-family: 'Zen Old Mincho', serif; font-size: 11px; color: #c9a84c; display: block; }
  .card-slot { width: 80px; height: 120px; border: 2px dashed rgba(201,168,76,0.3); border-radius: 6px; position: relative; transition: all 0.5s; }
  .card-slot.active { border-color: rgba(201,168,76,1); box-shadow: 0 0 15px rgba(201,168,76,0.4) inset; transform: translateY(-5px); }
  .card-slot.filled { border-style: solid; border-color: rgba(201,168,76,0.6); background: linear-gradient(135deg, #1d0d42, #3b1d6b); background-image: repeating-linear-gradient(45deg, rgba(201,168,76,0.1) 0, rgba(201,168,76,0.1) 2px, transparent 2px, transparent 6px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateY(0); }
  .card-deck { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; animation: fadeUp 0.8s ease both; }
  .card-back { width: 40px; height: 65px; background: linear-gradient(135deg, #1d0d42, #3b1d6b); border: 1px solid rgba(201,168,76,0.5); border-radius: 4px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 8px rgba(0,0,0,0.6); background-image: repeating-linear-gradient(45deg, rgba(201,168,76,0.1) 0, rgba(201,168,76,0.1) 2px, transparent 2px, transparent 6px); }
  .card-back:hover { transform: translateY(-8px); border-color: #c9a84c; box-shadow: 0 8px 15px rgba(201,168,76,0.4); }
  .card-back.selected { opacity: 0; transform: translateY(-30px) scale(0.8); pointer-events: none; }
  .result-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,.15); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; animation: fadeUp 0.6s ease both; }
  .card-label { font-size: 10px; color: #9b7e4a; letter-spacing: 3px; margin-bottom: 10px; display: inline-block; border: 1px solid #9b7e4a; padding: 2px 10px; border-radius: 20px; }
  .card-img-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
  .card-img { width: 140px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); transition: transform 0.5s; }
  .card-img.reversed { transform: rotate(180deg); }
  .card-name { font-size: 18px; color: #c9a84c; margin-bottom: 8px; }
  .card-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
  .status-up { border: 1px solid #90d890; color: #90d890; background: rgba(40,100,60,.2); }
  .status-rev { border: 1px solid #c890e8; color: #c890e8; background: rgba(120,40,140,.2); }
  .card-text { font-size: 13px; color: #d0c0b0; line-height: 2; text-align: left; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
  .action-area { margin-top: 30px; animation: fadeUp 0.8s ease both; width: 100%; }
  .btn-line { width: 100%; background: #06C755; color: #fff; border: none; padding: 18px; border-radius: 12px; font-size: 15px; font-weight: bold; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(6,199,85,.3); transition: all 0.2s; margin-top: 15px; }
  .btn-line:hover { background: #05b34c; transform: translateY(-2px); }
  .btn-reset { background: none; border: none; color: #887a92; font-family: inherit; font-size: 11px; margin: 20px auto 0; display: block; cursor: pointer; letter-spacing: 2px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="20" cy="20" r="1" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="300" cy="250" r="1" fill="white" opacity="0.2"/><circle cx="80" cy="320" r="2" fill="white" opacity="0.4"/></svg>') repeat; }
</style>
</head>
<body class="theme-default">
<div class="stars"></div>
<div class="container">
  <header class="header">
    <div class="header-eye">✦ LOGICAL TAROT ✦</div>
    <h1 class="header-ttl">AI <em>タロット</em></h1>
    <div class="header-rule"></div>
  </header>
  <div class="panel" id="main-panel">
    <p class="mode-desc">「今、ここ」の直感を言語化しませんか？</p>
    <div class="btn-wrap">
      <button class="mode-row" onclick="window.startSelection(1)">
        <div class="btn-mode-rect"><span>I</span></div>
        <div class="mode-info">
          <div class="mode-name">一枚引き</div>
          <div class="mode-text">あなたの“今”を読むのにおすすめ</div>
        </div>
      </button>
      <button class="mode-row" onclick="window.startSelection(2)">
        <div class="btn-mode-rect"><span>II</span></div>
        <div class="mode-info">
          <div class="mode-name">二者択一</div>
          <div class="mode-text">AかBか、迷っている2つの道の行く末を比較</div>
        </div>
      </button>
      <button class="mode-row" onclick="window.startSelection(3)">
        <div class="btn-mode-rect"><span>III</span></div>
        <div class="mode-info">
          <div class="mode-name">三枚引き</div>
          <div class="mode-text">悩みの過去・現在・未来の流れを読むのにおすすめ</div>
        </div>
      </button>
    </div>
  </div>
</div>
<script>
const CARDS = [
  { id: "fool", name: "愚者", nameEn: "THE FOOL", number: "0", positive: "無限の可能性を秘めたスタートです。リスクや周囲の目は気にせず、あなたの直感を信じて踏み出す時。終わりではなく、新しい冒険の始まりです。", image: "" },
  { id: "magician", name: "魔術師", nameEn: "THE MAGICIAN", number: "I", positive: "あなたには、夢を現実に変えるすべての力が揃っています。意志・知性・情熱・直感。それらを一点に集中させることで、望む未来を自らの手で創り出せます。", image: "" },
  { id: "highpriestess", name: "女教皇", nameEn: "THE HIGH PRIESTESS", number: "II", positive: "あなたの内なる声は、すでに答えを知っています。論理より直感を信じる時。静かに自分の奥深くに耳を澄ませば、進むべき道が自然と見えてきます。", image: "" },
  { id: "empress", name: "女帝", nameEn: "THE EMPRESS", number: "III", positive: "あなたの中に豊かな創造力と愛のエネルギーが満ちています。育てること・表現すること・受け取ること。自然の流れに身を委ねることで、あらゆる豊かさが花開きます。", image: "" },
  { id: "emperor", name: "皇帝", nameEn: "THE EMPEROR", number: "IV", positive: "あなたの中にリーダーシップと確固たる意志が育っています。計画を立て、着実に実行する時。自分の人生の主役として、堂々と舵を取ってください。", image: "" },
  { id: "hierophant", name: "法王", nameEn: "THE HIEROPHANT", number: "V", positive: "信頼できる師や伝統の知恵の中に、あなたへのヒントが隠れています。学び・継承・信念を大切にすることで、揺るぎない基盤と深い智慧が身についていきます。", image: "" },
  { id: "lovers", name: "恋人", nameEn: "THE LOVERS", number: "VI", positive: "大切な選択の時が来ています。心から共鳴できる人・価値観・道を選ぶことが、あなたの人生を豊かにします。理性より心の声に従って選んだ先に、真の幸福があります。", image: "" },
  { id: "chariot", name: "戦車", nameEn: "THE CHARIOT", number: "VII", positive: "強い意志と自制心があなたを勝利へ導きます。迷いを断ち切り、目標に向かって一直線に進む時。周囲の声より自分の軸を信じることが、突破口を開きます。", image: "" },
  { id: "justice", name: "正義", nameEn: "THE JUSTICE", number: "VIII", positive: "あなたの誠実さと行動は、必ず正しく評価されます。今こそ公平な目で自分自身を見つめ直す時。真実に基づいた選択が、最節の結果をもたらします。", image: "" },
  { id: "hermit", name: "隠者", nameEn: "THE HERMIT", number: "IX", positive: "一人の時間こそ、あなたの最大の財産です。内なるランタンの光に従って歩むことで、誰も辿り着けない深い知恵と答えが見つかります。孤独は成長の証です。", image: "" },
  { id: "wheel", name: "運命の輪", nameEn: "THE WHEEL OF FORTUNE", number: "X", positive: "運命の流れがあなたに味方しています。チャンスの波が来ています。タイミングを信じて、大きな流れに身を委ねることで、人生が好転していきます。", image: "" },
  { id: "strength", name: "力", nameEn: "THE STRENGTH", number: "XI", positive: "あなたの中に、静かで揺るぎない強さが宿っています。力で押さえ込むのではなく、愛と忍耐で困難を乗り越える時。その優しさこそが、最大の武器です。", image: "" },
  { id: "hanged", name: "吊られた男", nameEn: "THE HANGED MAN", number: "XII", positive: "立ち止まることは、後退ではありません。今は視点を変える絶好の機会。別の角度から見ることで、これまで気づかなかった答えと可能性が見えてきます。", image: "" },
  { id: "death", name: "死神", nameEn: "THE DEATH", number: "XIII", positive: "終わりは、必ず新しい始まりを連れてきます。古いものを手放すことで、あなたはより本質的な自分へと生まれ変わります。変容を恐れず、次の章へ進んでください。", image: "" },
  { id: "temperance", name: "節制", nameEn: "THE TEMPERANCE", number: "XIV", positive: "バランスと調和があなたの強みです。焦らず、少しずつ注ぎ足すように物事を進めることで、最高の結果が生まれます。穏やかな流れを信じてください。", image: "" },
  { id: "devil", name: "悪魔", nameEn: "THE DEVIL", number: "XV", positive: "あなたを縛っているものの正体に、ようやく気づけるタイミングです。鎖は思い込みかもしれません。手放す勇気が、本当の自由への第一歩になります。", image: "" },
  { id: "tower", name: "塔", nameEn: "THE TOWER", number: "XVI", positive: "古い構造が崩れる時、新しい真実が見えてきます。一時の混乱は、より強固な土台を築くための必然です。変化を恐れず、再建のチャンスとして受け入れてください。", image: "" },
  { id: "star", name: "星", nameEn: "THE STAR", number: "XVII", positive: "希望の光が差し込んでいます。嵐の後の静けさのように、あなたの心に癒しと再生のエネルギーが満ちています。夢を信じて、穏やかに前へ進んでください。", image: "" },
  { id: "moon", name: "月", nameEn: "THE MOON", number: "XVIII", positive: "見えない力があなたを導いています。直感と夢のメッセージに耳を傾けて。不安は幻想かもしれません。内なる光を信じて、一歩ずつ進んでいきましょう。", image: "" },
  { id: "sun", name: "太陽", nameEn: "THE SUN", number: "XIX", positive: "輝かしいエネルギーと成功のサインです。自信を持って前に進んでください。あなたの情熱と喜びが、周囲をも照らし、道を切り開いていきます。", image: "" },
  { id: "judgement", name: "審判", nameEn: "THE JUDGEMENT", number: "XX", positive: "過去の経験すべてが、あなたを今ここへ導いてきました。新たな自分への目覚めと再生のサインです。内なる声に従い、次のステージへ踏み出す時が来ています。", image: "" },
  { id: "world", name: "世界", nameEn: "THE WORLD", number: "XXI", positive: "すべてが完成し、大きなサイクルが完結するサインです。努力が実を結び、あなたは次のステージへと進む準備ができています。", image: "" }
];
const REVERSED_TEXTS = { fool: "準備不足や無謀さへの警告です。今一度、足元を確かめてから踏み出してみましょう。", magician: "才能を活かしきれていません。散漫になったエネルギーを一点に集中させましょう。", highpriestess: "直感を見過ごしているサインです。頭で考えすぎず、静かに内なる声に耳を澄ませて。", empress: "自己犠牲になっていませんか。まず自分自身を大切にすることで、周りへの愛も深まります。", emperor: "コントロールへの執着が生じています。すべてを握りしめず、委ねる勇気も力のひとつです。", hierophant: "既存のルールに縛られすぎています。自分にとっての真実を、自ら問い直す時が来ています。", lovers: "選択を先延ばしにしているサインです。心の声に正直になることが、迷いを断ち切る鍵です。", chariot: "力任せに進もうとしていませんか。方向性を再確認し、エネルギーを賢く使いましょう。", justice: "不公平さへの怒りが心を乱しています。まず自分の行動を振り返ることから始めましょう。", hermit: "孤立しすぎているかもしれません。適度に他者とつながることで、新しい光が見えてきます。", wheel: "流れに乗り遅れている感覚があるかもしれません。焦らず、次のサイクルに備えましょう。", strength: "内なる力を過小評価しています。あなたはもっと強い。今こそ自分を信じ直す時です。", hanged: "無駄な我慢が続いているサインです。本当に必要な停滞なのか、見直す勇気を持ちましょう。", death: "変化を拒んでいることで停滞が起きています。手放す怖さより、手放した先の自由を想像して。", temperance: "焦りやアンバランスが生じています。呼吸を整え、ペースを落とすことが最善の選択です。", devil: "執着に気づき始めています。鎖は思ったより細いはず。一歩引いて全体を見渡してみましょう。", tower: "変化への抵抗が続いています。崩れることを恐れず、今こそ古い殻を脱ぎ捨てる時です。", star: "希望が見えにくくなっていますが、それは一時的なもの。小さな光を手放さないでください。", moon: "不安や混乱が増幅しています。今は大きな決断を避け、情報を整理する時間を取りましょう。", sun: "自信が揺らいでいますが、あなたの輝きは消えていません。内側の光を信じ直してください。", judgement: "自己批判が強くなっているサインです。過去を手放し、自分を許すことが再生への鍵です。", world: "完成間近ですが、何かが未完のままです。焦らず最後の仕上げに丁寧に向き合って。" };
window.requiredCount = 0; window.selectedCards = []; window.shuffledDeck = []; window.selectedCategory = ""; window.preMemo = ""; window.choiceA = ""; window.choiceB = "";
window.startSelection = function(count) {
  window.requiredCount = count;
  if (count === 2) { window.selectedCategory = "二者択一"; window.showTwoChoiceInput(); return; }
  const panel = document.getElementById("main-panel");
  let html = `<div class="selection-guide">今日はどの領域をスキャンしますか？</div><div class="category-wrap">`;
  const cats = [["今の仕事、どうなの？","（現状分析・キャリア）"],["お金との向き合い方を知りたい","（豊かさの思考・整理）"],["あの人との関係は？","（対人関係・心理）"],["あなたの知らない強み、気になりませんか？","（自己理解・才能）"],["とりあえず聞いて！","（自由入力・総合）"]];
  cats.forEach(c => { html += `<button class="btn-category" onclick="window.selectCategory('${c[0]}')">${c[0]}<span>${c[1]}</span></button>`; });
  html += `</div>`; panel.innerHTML = html;
};
window.selectCategory = function(category) {
  window.selectedCategory = category;
  const panel = document.getElementById("main-panel");
  panel.innerHTML = `<div class="selection-guide" style="font-size:14px; line-height:1.6; margin-bottom:15px;">「${category}」ですね。<br>そのことについて、今頭にあることを少しだけ書き出してみてください。</div><div class="pre-memo-wrap"><textarea id="pre-memo-input" style="height:100px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:15px; border-radius:10px; font-family:inherit; font-size:13px;" placeholder="言語化することで、カードの精度が上がります。（※書かずに進むこともできます）"></textarea><button class="btn-next" onclick="window.proceedToDeck()">直感でカードを引く</button></div>`;
};
window.showTwoChoiceInput = function() {
  const panel = document.getElementById("main-panel");
  panel.innerHTML = `<div class="selection-guide" style="font-size:14px; line-height:1.6; margin-bottom:15px;">「二者択一」ですね。<br>迷っている2つの選択肢を書き出してください。</div><div class="pre-memo-wrap" style="display:flex; flex-direction:column; gap:12px;"><input type="text" id="choice-a-input" placeholder="選択肢A（例：今の会社に残る）" style="width:100%; padding:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.5); color:#fff; border-radius:8px; outline:none; font-family:inherit;"><input type="text" id="choice-b-input" placeholder="選択肢B（例：思い切って転職する）" style="width:100%; padding:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.5); color:#fff; border-radius:8px; outline:none; font-family:inherit;"><textarea id="pre-memo-input" style="height:60px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:10px; border-radius:8px; font-family:inherit; font-size:12px;" placeholder="その他、率直な思いがあれば（任意）"></textarea><button class="btn-next" onclick="window.proceedToDeck()">直感でカードを引く</button></div>`;
};
window.proceedToDeck = function() {
  const m = document.getElementById("pre-memo-input"); window.preMemo = m ? m.value : "";
  if (window.requiredCount === 2) {
    const a = document.getElementById("choice-a-input"), b = document.getElementById("choice-b-input");
    window.choiceA = a && a.value ? a.value : "選択肢A"; window.choiceB = b && b.value ? b.value : "選択肢B";
  }
  window.selectedCards = []; window.shuffledDeck = [...CARDS].sort(() => Math.random() - 0.5);
  const panel = document.getElementById("main-panel");
  let html = `<div class="selection-guide" id="selection-guide"></div><div class="spread-area" id="spread-area">`;
  const lbs = window.requiredCount === 3 ? [{jp:'過去',en:'PAST'},{jp:'現在',en:'PRESENT'},{jp:'未来',en:'FUTURE'}] : window.requiredCount === 2 ? [{jp:'選択肢A',en:'OPTION A'},{jp:'選択肢B',en:'OPTION B'}] : [{jp:'鑑定結果',en:'RESULT'}];
  lbs.forEach((l, i) => { const n = window.requiredCount === 3 ? ['I','II','III'][i]+'. ' : ''; html += `<div class="slot-wrapper"><div class="slot-label" id="label-${i}">${n}${l.en}<span class="slot-label-jp">${l.jp}</span></div><div class="card-slot" id="slot-${i}"></div></div>`; });
  html += `</div><div class="card-deck">`;
  for(let i=0; i<CARDS.length; i++) html += `<div class="card-back" id="card-${i}" onclick="window.selectCard(${i})"></div>`;
  panel.innerHTML = html + `</div>`; window.updateSelectionUI();
};
window.updateSelectionUI = function() {
  const step = window.selectedCards.length, guide = document.getElementById("selection-guide");
  document.body.className = "";
  if (step === window.requiredCount) { guide.innerHTML = "運命が定まりました。結果をオープンします..."; document.body.classList.add("theme-future"); return; }
  for (let i=0; i<window.requiredCount; i++) {
    const s = document.getElementById(`slot-${i}`), l = document.getElementById(`label-${i}`);
    if (i === step) { s.classList.add("active"); if(l) l.classList.add("active-label"); }
    else { s.classList.remove("active"); if(l) l.classList.remove("active-label"); }
  }
  if (window.requiredCount === 1) { guide.innerHTML = "直感でカードを <strong>1枚</strong> 選んでください"; document.body.classList.add("theme-past"); }
  else if (window.requiredCount === 3) {
    const txts = ["【1枚目：過去】を決めるカードを選んでください","【2枚目：現在】の状態を表すカードを選んでください","【3枚目：未来】の可能性を示すカードを選んでください"];
    guide.innerHTML = txts[step]; document.body.classList.add(["theme-past","theme-present","theme-future"][step]);
  } else if (window.requiredCount === 2) {
    guide.innerHTML = step === 0 ? `【選択肢A】 <strong>${window.choiceA}</strong> の行く末を引いてください` : `【選択肢B】 <strong>${window.choiceB}</strong> の行く末を引いてください`;
    document.body.classList.add(step === 0 ? "theme-past" : "theme-present");
  }
};
window.selectCard = function(idx) {
  const el = document.getElementById(`card-${idx}`); if (el.classList.contains('selected')) return;
  const step = window.selectedCards.length;
  if (step < window.requiredCount) {
    el.classList.add('selected'); document.getElementById(`slot-${step}`).classList.add('filled');
    window.selectedCards.push(window.shuffledDeck[idx]); window.updateSelectionUI();
    if (window.selectedCards.length === window.requiredCount) setTimeout(() => window.showResults(), 1200);
  }
};
window.showResults = function() {
  const panel = document.getElementById("main-panel"); document.body.className = "theme-default";
  let html = ""; window.currentDrawnCards = [];
  window.selectedCards.forEach((c, i) => {
    const isRev = Math.random() < 0.3;
    let lbl = window.requiredCount === 3 ? ['過去','現在','未来'][i] : (window.requiredCount === 2 ? (i===0?`A: ${window.choiceA}`:`B: ${window.choiceB}`) : '鑑定結果');
    const msg = isRev ? (REVERSED_TEXTS[c.id] || "内省のサインです。") : c.positive;
    html += `<div class="result-card"><span class="card-label">${lbl}</span><div class="card-img-wrap"><img src="${c.image}" class="card-img ${isRev?'reversed':''}" alt="${c.name}"></div><div class="card-status ${isRev?'status-rev':'status-up'}">${isRev?'逆位置':'正位置'}</div><h2 class="card-name">${c.name} <span style="font-size:12px;color:#9b7e4a;">${c.nameEn}</span></h2><p class="card-text">${msg}</p></div>`;
    window.currentDrawnCards.push(`${c.name}${isRev?'（逆）':''}`);
  });
  panel.innerHTML = html + `<div class="action-area"><textarea id="user-memo" placeholder="Q. この結果を見て、心当たりがあることは何ですか？" style="height:90px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:15px; border-radius:10px; font-family:inherit; font-size:13px;"></textarea><button class="btn-line" onclick="window.sendToLine(${window.requiredCount})">公式LINEで相談を開始</button><p style="font-size:10px; color:#6a5a72; text-align:center; margin-top:8px;">※結果がコピーされます。LINEにそのまま貼り付けてください。</p><button class="btn-reset" onclick="location.reload()">最初に戻る</button></div>`;
};
window.sendToLine = function(cnt) {
  const post = document.getElementById("user-memo").value || "特になし", pre = window.preMemo || "特になし";
  let text = `【AIタロット鑑定結果】\nモード：${cnt===2?'二者択一':(cnt===1?'1枚引き':'3枚引き')}\n${cnt===2?`[A] ${window.choiceA}\n▶ ${window.currentDrawnCards[0]}\n\n[B] ${window.choiceB}\n▶ ${window.currentDrawnCards[1]}`:`テーマ：${window.selectedCategory}\nカード：${window.currentDrawnCards.join(" / ")}`}\n事前の思い：${pre}\n私の気づき：${post}\n\nこれについて詳しく相談したいです。`;
  navigator.clipboard.writeText(text).then(() => window.open('https://line.me/R/ti/p/@796tkxeg', '_blank')).catch(() => alert("コピー失敗。手動でお願いします。"));
};
</script>
