<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ロジカル・タロット</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Zen Old Mincho', serif; color: #e8dcc8; 
    display: flex; flex-direction: column; align-items: center; 
    min-height: 100vh; padding: 40px 20px; overflow-x: hidden;
    transition: background 1.5s ease;
  }
  body.theme-default { background: radial-gradient(ellipse at 22% 12%, #1d0d42 0%, #07050d 52%, #0a1520 100%); }
  body.theme-past    { background: radial-gradient(ellipse at 22% 12%, #0f172a 0%, #020617 52%, #000000 100%); }
  body.theme-present { background: radial-gradient(ellipse at 22% 12%, #422006 0%, #1a0d00 52%, #000000 100%); }
  body.theme-future  { background: radial-gradient(ellipse at 22% 12%, #3b0764 0%, #170229 52%, #000000 100%); }

  .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 30px; animation: fadeUp 0.8s ease both; }
  .header-eye { font-family: 'Cormorant Garamond', serif; font-size: 10px; letter-spacing: 6px; color: #9b7e4a; margin-bottom: 8px; }
  .header-ttl { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; font-style: italic; color: #e8dcc8; margin-bottom: 6px; }
  .header-ttl em { color: #c9a84c; font-style: normal; }
  .header-rule { width: 80px; height: 1px; margin: 0 auto; background: linear-gradient(to right, transparent, #c9a84c, transparent); }
  
  .panel { 
    background: rgba(255,255,255,.03); border: 1px solid rgba(201,168,76,.2); 
    border-radius: 16px; padding: 30px 20px; backdrop-filter: blur(10px);
    animation: fadeUp 0.5s 0.2s ease both; width: 100%;
  }

  /* ▼ 横並びモード選択のデザイン ▼ */
  .mode-desc { text-align: center; font-size: 13px; color: #c9a84c; margin-bottom: 24px; letter-spacing: 1px; }
  .btn-wrap { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
  .mode-row {
    display: flex; align-items: center; gap: 15px; width: 100%;
    cursor: pointer; transition: all 0.3s; padding: 10px;
    border-radius: 12px; background: rgba(255,255,255,0.02);
  }
  .mode-row:hover { background: rgba(201,168,76,0.1); transform: translateX(5px); }
  .btn-mode-rect {
    width: 60px; height: 60px; min-width: 60px; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.4); color: #c9a84c; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  .btn-mode-rect span { font-family: 'Cormorant Garamond', serif; font-size: 24px; }
  .mode-info { display: flex; flex-direction: column; justify-content: center; text-align: left; }
  .mode-name { font-size: 16px; color: #e8dcc8; font-weight: bold; margin-bottom: 4px; }
  .mode-text { font-size: 11px; color: #9b7e4a; line-height: 1.4; }

  /* ▼ カテゴリー・悩み入力のデザイン ▼ */
  .category-wrap { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; animation: fadeUp 0.6s ease both; }
  .btn-category {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,.4); color: #e8dcc8;
    padding: 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s;
    text-align: left; font-family: inherit; font-size: 14px;
  }
  .btn-category:hover { background: rgba(201,168,76,.15); border-color: #c9a84c; transform: translateX(5px); }
  .btn-category span { display: block; font-size: 10px; color: #9b7e4a; margin-top: 4px; }
  .pre-memo-wrap { animation: fadeUp 0.6s ease both; text-align: center; width: 100%; }
  .btn-next {
    background: linear-gradient(135deg, #c9a84c, #9b7e4a); color: #1a0d00; border: none; padding: 15px 30px;
    border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s;
    margin-top: 10px; font-family: inherit; letter-spacing: 1px; width: 100%;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201,168,76,0.4); }
  
  /* ▼ 占い展開画面のデザイン ▼ */
  .selection-guide {
    text-align: center; margin-bottom: 20px; color: #e8dcc8; font-size: 15px; font-weight: bold; letter-spacing: 1px; animation: fadeUp 0.4s ease both; min-height: 24px; transition: color 0.5s;
  }
  .spread-area {
    display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; min-height: 160px; animation: fadeUp 0.6s ease both;
  }
  .slot-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .slot-label {
    font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #6a5a72;
    letter-spacing: 2px; text-align: center; line-height: 1.3; transition: all 0.5s;
  }
  .slot-label.active-label { color: #e8dcc8; text-shadow: 0 0 10px rgba(232,220,200,0.8); transform: scale(1.05); }
  .slot-label-jp { font-family: 'Zen Old Mincho', serif; font-size: 11px; color: #c9a84c; display: block; }
  .card-slot { width: 80px; height: 120px; border: 2px dashed rgba(201,168,76,0.3); border-radius: 6px; position: relative; transition: all 0.5s; }
  .card-slot.active { border-color: rgba(201,168,76,1); box-shadow: 0 0 15px rgba(201,168,76,0.4) inset; transform: translateY(-5px); }
  .card-slot.filled {
    border-style: solid; border-color: rgba(201,168,76,0.6); background: linear-gradient(135deg, #1d0d42, #3b1d6b); background-image: repeating-linear-gradient(45deg, rgba(201,168,76,0.1) 0, rgba(201,168,76,0.1) 2px, transparent 2px, transparent 6px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateY(0);
  }
  
  .card-deck { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; animation: fadeUp 0.8s ease both; }
  .card-back {
    width: 40px; height: 65px; background: linear-gradient(135deg, #1d0d42, #3b1d6b); border: 1px solid rgba(201,168,76,0.5); border-radius: 4px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 8px rgba(0,0,0,0.6); background-image: repeating-linear-gradient(45deg, rgba(201,168,76,0.1) 0, rgba(201,168,76,0.1) 2px, transparent 2px, transparent 6px);
  }
  .card-back:hover { transform: translateY(-8px); border-color: #c9a84c; box-shadow: 0 8px 15px rgba(201,168,76,0.4); }
  .card-back.selected { opacity: 0; transform: translateY(-30px) scale(0.8); pointer-events: none; }

  /* ▼ 結果画面のデザイン ▼ */
  .result-card {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,.15);
    border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; animation: fadeUp 0.6s ease both;
  }
  .card-label { font-size: 10px; color: #9b7e4a; letter-spacing: 3px; margin-bottom: 10px; display: inline-block; border: 1px solid #9b7e4a; padding: 2px 10px; border-radius: 20px; }
  .card-img-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
  .card-img { width: 140px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); transition: transform 0.5s; }
  .card-img.reversed { transform: rotate(180deg); }
  .card-name { font-size: 18px; color: #c9a84c; margin-bottom: 8px; }
  .card-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
  .status-up { border: 1px solid #90d890; color: #90d890; background: rgba(40,100,60,.2); }
  .status-rev { border: 1px solid #c890e8; color: #c890e8; background: rgba(120,40,140,.2); }
  .card-text { font-size: 13px; color: #d0c0b0; line-height: 2; text-align: left; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
  
  .action-area { margin-top: 30px; animation: fadeUp 0.8s ease both; width: 100%; }
  .btn-line {
    width: 100%; background: #06C755; color: #fff; border: none; padding: 18px;
    border-radius: 12px; font-size: 15px; font-weight: bold; letter-spacing: 1px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(6,199,85,.3); transition: all 0.2s; margin-top: 15px;
  }
  .btn-line:hover { background: #05b34c; transform: translateY(-2px); }
  .btn-reset {
    background: none; border: none; color: #887a92; font-family: inherit; font-size: 11px;
    margin: 20px auto 0; display: block; cursor: pointer; letter-spacing: 2px;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="20" cy="20" r="1" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="300" cy="250" r="1" fill="white" opacity="0.2"/><circle cx="80" cy="320" r="2" fill="white" opacity="0.4"/></svg>') repeat; }
</style>
</head>
<body class="theme-default">

<div class="stars"></div>

<div class="container">
  <header class="header">
    <div class="header-eye">✦ LOGICAL TAROT ✦</div>
    <h1 class="header-ttl">AI <em>タロット</em></h1>
    <div class="header-rule"></div>
  </header>

  <div class="panel" id="main-panel">
    <p class="mode-desc">「今、ここ」の直感を言語化しませんか？</p>
    
    <div class="btn-wrap">
      <div class="mode-row" onclick="window.startSelection(1)">
        <button class="btn-mode-rect"><span>I</span></button>
        <div class="mode-info">
          <div class="mode-name">一枚引き</div>
          <div class="mode-text">あなたの“今”を読むのにおすすめ</div>
        </div>
      </div>

      <div class="mode-row" onclick="window.startSelection(2)">
        <button class="btn-mode-rect"><span>II</span></button>
        <div class="mode-info">
          <div class="mode-name">二者択一</div>
          <div class="mode-text">AかBか、迷っている2つの道の行く末を比較</div>
        </div>
      </div>

      <div class="mode-row" onclick="window.startSelection(3)">
        <button class="btn-mode-rect"><span>III</span></button>
        <div class="mode-info">
          <div class="mode-name">三枚引き</div>
          <div class="mode-text">悩みの過去・現在・未来の流れを読むのにおすすめ</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ==========================================================
// ▼ ここに、お手元のファイルからカード22枚のデータを貼り付けてください！ ▼
// ==========================================================
const CARDS = [
  // { id: "fool", ... }, をここに入れます
];
// ==========================================================
// ▲ ここまで ▲
// ==========================================================

const REVERSED_TEXTS = {
  fool: "準備不足や無謀さへの警告です。今一度、足元を確かめてから踏み出してみましょう。",
  magician: "才能を活かしきれていません。散漫になったエネルギーを一点に集中させましょう。",
  highpriestess: "直感を見過ごしているサインです。頭で考えすぎず、静かに内なる声に耳を澄ませて。",
  empress: "自己犠牲になっていませんか。まず自分自身を大切にすることで、周りへの愛も深まります。",
  emperor: "コントロールへの執着が生じています。すべてを握りしめず、委ねる勇気も力のひとつです。",
  hierophant: "既存のルールに縛られすぎています。自分にとっての真実を、自ら問い直す時が来ています。",
  lovers: "選択を先延ばしにしているサインです。心の声に正直になることが、迷いを断ち切る鍵です。",
  chariot: "力任せに進もうとしていませんか。方向性を再確認し、エネルギーを賢く使いましょう。",
  justice: "不公平さへの怒りが心を乱しています。まず自分の行動を振り返ることから始めましょう。",
  hermit: "孤立しすぎているかもしれません。適度に他者とつながることで、新しい光が見えてきます。",
  wheel: "流れに乗り遅れている感覚があるかもしれません。焦らず、次のサイクルに備えましょう。",
  strength: "内なる力を過小評価しています。あなたはもっと強い。今こそ自分を信じ直す時です。",
  hanged: "無駄な我慢が続いているサインです。本当に必要な停滞なのか、見直す勇気を持ちましょう。",
  death: "変化を拒んでいることで停滞が起きています。手放す怖さより、手放した先の自由を想像して。",
  temperance: "焦りやアンバランスが生じています。呼吸を整え、ペースを落とすことが最善の選択です。",
  devil: "執着に気づき始めています。鎖は思ったより細いはず。一歩引いて全体を見渡してみましょう。",
  tower: "変化への抵抗が続いています。崩れることを恐れず、今こそ古い殻を脱ぎ捨てる時です。",
  star: "希望が見えにくくなっていますが、それは一時的なもの。小さな光を手放さないでください。",
  moon: "不安や混乱が増幅しています。今は大きな決断を避け、情報を整理する時間を取りましょう。",
  sun: "自信が揺らいでいますが、あなたの輝きは消えていません。内側の光を信じ直してください。",
  judgement: "自己批判が強くなっているサインです。過去を手放し、自分を許すことが再生への鍵です。",
  world: "完成間近ですが、何かが未完のままです。焦らず最後の仕上げに丁寧に向き合って。"
};

window.requiredCount = 0;
window.selectedCards = [];
window.shuffledDeck = [];
window.selectedCategory = "";
window.preMemo = "";
window.choiceA = "";
window.choiceB = "";

// モード選択
window.startSelection = function(count) {
  window.requiredCount = count;
  if (count === 2) {
    window.selectedCategory = "二者択一";
    window.showTwoChoiceInput();
    return;
  }
  const panel = document.getElementById("main-panel");
  let html = `<div class="selection-guide">今日はどの領域をスキャンしますか？</div>`;
  html += `<div class="category-wrap">
    <button class="btn-category" onclick="window.selectCategory('今の仕事、どうなの？')">今の仕事、どうなの？<span>（現状分析・キャリア）</span></button>
    <button class="btn-category" onclick="window.selectCategory('お金との向き合い方を知りたい')">お金との向き合い方を知りたい<span>（豊かさの思考・整理）</span></button>
    <button class="btn-category" onclick="window.selectCategory('あの人との関係は？')">あの人との関係は？<span>（対人関係・心理）</span></button>
    <button class="btn-category" onclick="window.selectCategory('あなたの知らない強み、気になりませんか？')">あなたの知らない強み、気になりませんか？<span>（自己理解・才能）</span></button>
    <button class="btn-category" onclick="window.selectCategory('とりあえず聞いて！')">とりあえず聞いて！<span>（自由入力・総合）</span></button>
  </div>`;
  panel.innerHTML = html;
};

// 1枚・3枚引き用：カテゴリー選択後
window.selectCategory = function(category) {
  window.selectedCategory = category;
  const panel = document.getElementById("main-panel");
  let html = `<div class="selection-guide" style="font-size:14px; line-height:1.6; margin-bottom:15px;">
    「${category}」ですね。<br>そのことについて、今頭にあることを少しだけ書き出してみてください。
  </div>`;
  html += `<div class="pre-memo-wrap">
    <textarea id="pre-memo-input" style="height:100px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:15px; border-radius:10px; font-family:inherit; font-size:13px;" placeholder="言語化することで、カードの精度が上がります。（※書かずに進むこともできます）"></textarea>
    <button class="btn-next" onclick="window.proceedToDeck()">直感でカードを引く</button>
  </div>`;
  panel.innerHTML = html;
};

// 2枚引き用：A・B入力画面
window.showTwoChoiceInput = function() {
  const panel = document.getElementById("main-panel");
  let html = `<div class="selection-guide" style="font-size:14px; line-height:1.6; margin-bottom:15px;">
    「二者択一」ですね。<br>迷っている2つの選択肢を書き出してください。
  </div>`;
  html += `<div class="pre-memo-wrap" style="display:flex; flex-direction:column; gap:12px;">
    <input type="text" id="choice-a-input" placeholder="選択肢A（例：今の会社に残る）" style="width:100%; padding:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.5); color:#fff; border-radius:8px; outline:none; font-family:inherit;">
    <input type="text" id="choice-b-input" placeholder="選択肢B（例：思い切って転職する）" style="width:100%; padding:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.5); color:#fff; border-radius:8px; outline:none; font-family:inherit;">
    <textarea id="pre-memo-input" style="height:60px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:10px; border-radius:8px; font-family:inherit; font-size:12px;" placeholder="その他、率直な思いがあれば（任意）"></textarea>
    <button class="btn-next" onclick="window.proceedToDeck()">直感でカードを引く</button>
  </div>`;
  panel.innerHTML = html;
};

// カード展開へ
window.proceedToDeck = function() {
  const memoInput = document.getElementById("pre-memo-input");
  window.preMemo = memoInput ? memoInput.value : "";
  if (window.requiredCount === 2) {
    const aInput = document.getElementById("choice-a-input");
    const bInput = document.getElementById("choice-b-input");
    window.choiceA = aInput && aInput.value ? aInput.value : "選択肢A";
    window.choiceB = bInput && bInput.value ? bInput.value : "選択肢B";
  }
  if (!CARDS || CARDS.length === 0) {
    alert("エラー：カードデータが設定されていません。"); return;
  }
  window.selectedCards = [];
  window.shuffledDeck = [...CARDS];
  for (let i = window.shuffledDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [window.shuffledDeck[i], window.shuffledDeck[j]] = [window.shuffledDeck[j], window.shuffledDeck[i]];
  }

  const panel = document.getElementById("main-panel");
  let html = `<div class="selection-guide" id="selection-guide"></div>`;
  html += `<div class="spread-area" id="spread-area">`;
  
  const labels = window.requiredCount === 3 ? [{jp: '過去', en: 'PAST'}, {jp: '現在', en: 'PRESENT'}, {jp: '未来', en: 'FUTURE'}] : 
                 window.requiredCount === 2 ? [{jp: '選択肢A', en: 'OPTION A'}, {jp: '選択肢B', en: 'OPTION B'}] :
                 [{jp: '鑑定結果', en: 'RESULT'}];
    
  labels.forEach((labelObj, i) => {
    const num = window.requiredCount === 3 ? ['I', 'II', 'III'][i] + '. ' : '';
    html += `
      <div class="slot-wrapper">
        <div class="slot-label" id="label-${i}">${num}${labelObj.en}<span class="slot-label-jp">${labelObj.jp}</span></div>
        <div class="card-slot" id="slot-${i}"></div>
      </div>
    `;
  });
  html += `</div>`;

  html += `<div class="card-deck">`;
  for(let i = 0; i < 22; i++) { html += `<div class="card-back" id="card-${i}" onclick="window.selectCard(${i})"></div>`; }
  html += `</div>`;
  
  panel.innerHTML = html;
  window.updateSelectionUI();
};

// ハイライト更新
window.updateSelectionUI = function() {
  const currentStep = window.selectedCards.length;
  const guideEl = document.getElementById("selection-guide");
  document.body.className = "";
  
  if (currentStep === window.requiredCount) {
    guideEl.innerHTML = "運命が定まりました。結果をオープンします...";
    document.body.classList.add("theme-future"); return;
  }

  for (let i = 0; i < window.requiredCount; i++) {
    const slot = document.getElementById(`slot-${i}`);
    const label = document.getElementById(`label-${i}`);
    if (i === currentStep) {
      slot.classList.add("active"); if(label) label.classList.add("active-label");
    } else {
      slot.classList.remove("active"); if(label) label.classList.remove("active-label");
    }
  }

  if (window.requiredCount === 1) {
    guideEl.innerHTML = "直感でカードを <strong>1枚</strong> 選んでください"; document.body.classList.add("theme-past");
  } else if (window.requiredCount === 3) {
    if (currentStep === 0) { guideEl.innerHTML = "【1枚目：過去】を決めるカードを選んでください"; document.body.classList.add("theme-past"); }
    else if (currentStep === 1) { guideEl.innerHTML = "【2枚目：現在】の状態を表すカードを選んでください"; document.body.classList.add("theme-present"); }
    else if (currentStep === 2) { guideEl.innerHTML = "【3枚目：未来】の可能性を示すカードを選んでください"; document.body.classList.add("theme-future"); }
  } else if (window.requiredCount === 2) {
    if (currentStep === 0) { guideEl.innerHTML = `【選択肢A】 <strong>${window.choiceA}</strong> の行く末を示すカードを引いてください`; document.body.classList.add("theme-past"); }
    else if (currentStep === 1) { guideEl.innerHTML = `【選択肢B】 <strong>${window.choiceB}</strong> の行く末を示すカードを引いてください`; document.body.classList.add("theme-present"); }
  }
};

// カード選択
window.selectCard = function(index) {
  const cardEl = document.getElementById(`card-${index}`);
  if (cardEl.classList.contains('selected')) return;
  const currentStep = window.selectedCards.length;
  if (currentStep < window.requiredCount) {
    cardEl.classList.add('selected');
    document.getElementById(`slot-${currentStep}`).classList.add('filled');
    window.selectedCards.push(window.shuffledDeck[index]);
    window.updateSelectionUI();
    if (window.selectedCards.length === window.requiredCount) {
      setTimeout(() => { window.showResults(); }, 1200);
    }
  }
};

// 結果表示
window.showResults = function() {
  const panel = document.getElementById("main-panel");
  document.body.className = "theme-default";
  let html = "";
  window.currentDrawnCards = [];

  window.selectedCards.forEach((c, i) => {
    const isReversed = Math.random() < 0.3;
    let label = '鑑定結果';
    if (window.requiredCount === 3) label = ['過去', '現在', '未来'][i];
    if (window.requiredCount === 2) label = i === 0 ? `A: ${window.choiceA}` : `B: ${window.choiceB}`;
    
    const statusClass = isReversed ? "status-rev" : "status-up";
    const statusText = isReversed ? "逆位置" : "正位置";
    const imgClass = isReversed ? "card-img reversed" : "card-img";
    const msg = isReversed ? (REVERSED_TEXTS[c.id] || "内省のサインです。自分と向き合ってみましょう。") : c.positive;

    html += `
      <div class="result-card">
        <span class="card-label">${label}</span>
        <div class="card-img-wrap"><img src="${c.image}" class="${imgClass}" alt="${c.name}"></div>
        <div class="card-status ${statusClass}">${statusText}</div>
        <h2 class="card-name">${c.name} <span style="font-size:12px;color:#9b7e4a;">${c.nameEn}</span></h2>
        <p class="card-text">${msg}</p>
      </div>
    `;
    window.currentDrawnCards.push(`${c.name}${isReversed ? '（逆）' : ''}`);
  });

  html += `
    <div class="action-area">
      <textarea id="user-memo" placeholder="Q. この結果を見て、心当たりがあることは何ですか？" style="height:90px; background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,.3); color:#fff; width:100%; padding:15px; border-radius:10px; font-family:inherit; font-size:13px;"></textarea>
      <button class="btn-line" onclick="window.sendToLine(${window.requiredCount})">公式LINEで相談を開始</button>
      <p style="font-size:10px; color:#6a5a72; text-align:center; margin-top:8px;">※結果がコピーされます。LINEにそのまま貼り付けてください。</p>
      <button class="btn-reset" onclick="location.reload()">最初に戻る</button>
    </div>
  `;
  panel.innerHTML = html;
};

// LINE送信
window.sendToLine = function(count) {
  const postMemo = document.getElementById("user-memo").value || "特になし";
  const preMemoText = window.preMemo ? window.preMemo : "特になし";
  let text = "";
  
  if (count === 2) {
    text = `【AIタロット鑑定結果】
モード：二者択一（2枚引き）
事前の思い：${preMemoText}

[選択肢A] ${window.choiceA}
▶ ${window.currentDrawnCards[0]}

[選択肢B] ${window.choiceB}
▶ ${window.currentDrawnCards[1]}

私の気づき：${postMemo}

この選択について詳しく相談したいです。`;
  } else {
    const cardNames = window.currentDrawnCards.join(" / ");
    const modeText = count === 1 ? "1枚引き" : "3枚引き";
    text = `【タロット鑑定結果】
モード：${modeText}
テーマ：${window.selectedCategory}
事前の思い：${preMemoText}

カード：${cardNames}
私の気づき：${postMemo}

これについて詳しく相談したいです。`;
  }
  
  navigator.clipboard.writeText(text).then(() => {
    window.open('https://line.me/R/ti/p/@796tkxeg', '_blank');
  }).catch(err => {
    alert("コピーに失敗しました。お手数ですが手動でコピーしてください。");
  });
};
</script>
