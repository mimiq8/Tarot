<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tarot</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Old+Mincho:wght@400&display=swap");
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#07050d;}
@keyframes twinkle{from{opacity:.05}to{opacity:.72}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes lineGlow{0%,100%{box-shadow:0 8px 28px rgba(6,199,85,.28)}50%{box-shadow:0 8px 36px rgba(6,199,85,.5)}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.55}100%{transform:scale(2.1);opacity:0}}
.app{min-height:100vh;background:radial-gradient(ellipse at 22% 12%,#1d0d42 0%,#07050d 52%,#0a1520 100%);font-family:"Zen Old Mincho",serif;color:#e8dcc8;display:flex;flex-direction:column;align-items:center;padding:28px 16px 64px;position:relative;overflow:hidden;}
.container{position:relative;z-index:1;width:100%;max-width:400px;}
.header{text-align:center;margin-bottom:20px;animation:fadeUp .8s ease both;}
.header-eye{font-family:"Cormorant Garamond",serif;font-size:8px;letter-spacing:7px;color:#9b7e4a;text-transform:uppercase;margin-bottom:10px;}
.header-ttl{font-family:"Cormorant Garamond",serif;font-size:38px;font-weight:300;font-style:italic;color:#e8dcc8;line-height:1;letter-spacing:2px;margin-bottom:6px;}
.header-ttl em{color:#c9a84c;}
.header-rule{width:120px;height:1px;margin:12px auto 0;background:linear-gradient(to right,transparent,#c9a84c,transparent);}
.panel{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.16);border-radius:16px;padding:28px 20px;backdrop-filter:blur(18px);position:relative;overflow:hidden;}
.panel::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.38),transparent);}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
.mode-btn{background:transparent;border:1px solid rgba(201,168,76,.35);color:#c9a84c;font-family:"Zen Old Mincho",serif;padding:20px 12px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .3s;}
.mode-num{font-family:"Cormorant Garamond",serif;font-size:32px;font-weight:300;line-height:1;}
.mode-label{font-size:12px;letter-spacing:2px;}
.mode-desc{font-size:9px;color:#6a5a72;letter-spacing:1px;}
.btn-primary{width:100%;background:transparent;border:1px solid rgba(201,168,76,.46);color:#c9a84c;font-family:"Zen Old Mincho",serif;font-size:13px;letter-spacing:3px;padding:14px;border-radius:8px;cursor:pointer;transition:all .3s;margin-top:10px;display:block;}
.btn-line{width:100%;background:#06C755;border:none;color:#fff;font-family:"Zen Old Mincho",serif;font-size:14px;padding:16px;border-radius:10px;cursor:pointer;display:block;text-align:center;animation:lineGlow 2.5s ease-in-out infinite;margin-top:10px;}
.btn-ghost{background:none;border:none;color:#3a3040;font-family:"Zen Old Mincho",serif;font-size:10px;cursor:pointer;display:block;margin:14px auto 0;padding:8px;letter-spacing:2px;}
.ref-ta{width:100%;background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.15);border-radius:8px;color:#e8dcc8;font-family:"Zen Old Mincho",serif;font-size:12px;padding:12px;height:80px;resize:none;outline:none;margin-bottom:14px;margin-top:8px;display:block;}
.divider{width:100%;height:1px;margin:20px 0;background:linear-gradient(to right,transparent,rgba(201,168,76,.14),transparent);}
.footer{text-align:center;font-size:8px;color:#1e1826;margin-top:32px;letter-spacing:4px;}
.card-wrap{position:relative;flex-shrink:0;border-radius:10px;overflow:hidden;box-shadow:0 0 0 1px rgba(201,168,76,.3),0 16px 40px rgba(0,0,0,.6);transition:transform .4s;animation:cardFloat 5s ease-in-out infinite;}
.card-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .6s;}
.card-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(7,5,13,.75),transparent);padding:16px 4px 6px;text-align:center;}
.placeholder{position:absolute;inset:0;background:linear-gradient(160deg,#1a0f3a,#07050d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.cell{aspect-ratio:1/1.6;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .25s;cursor:pointer;}
.analysis{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.1);border-radius:10px;padding:18px;margin-bottom:18px;position:relative;}
.analysis::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.4),transparent);}
.pos-tag{font-size:9px;letter-spacing:2px;padding:3px 12px;border-radius:20px;display:inline-block;}
.step-row{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px;flex-wrap:wrap;}
.sdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;}
.sline{width:24px;height:1px;margin-bottom:16px;}
</style>
</head>
<body>
<div id="app"><div style="color:#c9a84c;text-align:center;padding:40px;font-family:serif">✦ Loading...</div></div>
<script src="cards.js"></script>
<script>
(function(){
const LINE_URL="https://line.me/R/ti/p/@796tkxeg";
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let state={step:“mode”,mode:null,drawn:[],idx:0,reflection:””};
function setState(s){state={…state,…s};render();}

const stars=Array.from({length:20},(_,i)=>({x:((i*43+11)%100)+”%”,y:((i*61+9)%100)+”%”,size:0.8+(i%4)*0.6,delay:(i*0.3)%4.5,dur:1.6+(i%7)*0.4}));

function el(tag,props,…children){
const e=document.createElement(tag);
if(props)Object.entries(props).forEach(([k,v])=>{
if(k===“class”)e.className=v;
else if(k===“style”&&typeof v===“object”)Object.assign(e.style,v);
else if(k.startsWith(“on”))e.addEventListener(k.slice(2).toLowerCase(),v);
else e.setAttribute(k,v);
});
children.flat(Infinity).forEach(c=>{
if(c==null||c===false)return;
e.appendChild(typeof c===“string”||typeof c===“number”?document.createTextNode(c):c);
});
return e;
}

function CardImg(card,size){
const w=size===“small”?90:size===“large”?180:140;
const wrap=el(“div”,{class:“card-wrap”,style:{width:w+“px”,aspectRatio:“1/1.79”,transform:card.isReversed?“rotate(180deg)”:“none”}});
const ph=el(“div”,{class:“placeholder”},el(“span”,{style:{fontSize:“20px”,color:”#c9a84c”}},“✦”));
wrap.appendChild(ph);
const img=el(“img”,{alt:card.name,style:{opacity:“0”}});
img.onload=()=>{img.style.opacity=“1”;ph.style.display=“none”;
wrap.appendChild(el(“div”,{class:“card-overlay”},el(“span”,{style:{fontSize:“9px”,letterSpacing:“2px”,color:“rgba(230,215,180,.85)”}},card.nameEn)));
};
img.onerror=()=>{ph.innerHTML=””;ph.appendChild(el(“span”,{style:{fontSize:“28px”,color:”#c9a84c”}},“✦”));ph.appendChild(el(“span”,{style:{fontSize:“9px”,color:”#c9a84c”}},card.nameEn));};
setTimeout(()=>{if(img.style.opacity===“0”){img.style.opacity=“1”;ph.style.display=“none”;}},5000);
img.src=card.image;
wrap.appendChild(img);
return wrap;
}

function CardReveal(card,position,total){
const posLabels=[“過去”,“現在”,“未来”];
const text=card.isReversed?(REVERSED_TEXTS[card.id]||””):card.positive;
const div=el(“div”,{style:{opacity:“0”,transition:“opacity .6s”}});
setTimeout(()=>div.style.opacity=“1”,100);
if(total===3)div.appendChild(el(“div”,{style:{textAlign:“center”,marginBottom:“10px”}},
el(“span”,{style:{fontSize:“9px”,letterSpacing:“3px”,color:”#9b7e4a”,border:“1px solid rgba(201,168,76,.3)”,padding:“3px 10px”,borderRadius:“20px”}},posLabels[position])));
div.appendChild(el(“div”,{style:{display:“flex”,justifyContent:“center”,marginBottom:“16px”}},CardImg(card,total===1?“large”:“normal”)));
div.appendChild(el(“div”,{style:{display:“flex”,justifyContent:“center”,marginBottom:“12px”}},
el(“span”,{class:“pos-tag”,style:{background:card.isReversed?“rgba(120,40,140,.2)”:“rgba(40,100,60,.2)”,border:“1px solid “+(card.isReversed?“rgba(180,80,200,.4)”:“rgba(80,160,80,.4)”),color:card.isReversed?”#c890e8”:”#90d890”}},
card.isReversed?“逆位置”:“正位置”)));
div.appendChild(el(“div”,{class:“analysis”},
el(“div”,{style:{fontFamily:“Cormorant Garamond,serif”,fontSize:“8px”,letterSpacing:“5px”,color:”#9b7e4a”,textAlign:“center”,marginBottom:“10px”}},card.isReversed?“INNER MESSAGE”:“POSITIVE ANALYSIS”),
el(“div”,{style:{fontFamily:“Cormorant Garamond,serif”,fontSize:“17px”,fontWeight:“300”,color:”#c9a84c”,textAlign:“center”,marginBottom:“10px”}},card.name+” · “+card.nameEn),
el(“p”,{style:{fontSize:“11px”,color:”#a09080”,lineHeight:“2.1”}},text)));
return div;
}

function ThreeSummary(cards){
const d=el(“div”,null);
const row=el(“div”,{style:{display:“flex”,justifyContent:“center”,gap:“12px”,marginBottom:“20px”}});
const labs=[“過去”,“現在”,“未来”];
cards.forEach((c,i)=>{
const col=el(“div”,{style:{display:“flex”,flexDirection:“column”,alignItems:“center”,gap:“6px”}});
col.appendChild(el(“span”,{style:{fontSize:“8px”,letterSpacing:“2px”,color:”#9b7e4a”}},labs[i]));
col.appendChild(CardImg(c,“small”));
col.appendChild(el(“span”,{style:{fontSize:“7px”,color:c.isReversed?”#c890e8”:”#90d890”,border:“1px solid “+(c.isReversed?“rgba(180,80,200,.3)”:“rgba(80,160,80,.3)”),padding:“2px 6px”,borderRadius:“10px”}},c.isReversed?“逆”:“正”));
row.appendChild(col);
});
d.appendChild(row);
const box=el(“div”,{class:“analysis”});
box.appendChild(el(“div”,{style:{fontFamily:“Cormorant Garamond,serif”,fontSize:“8px”,letterSpacing:“5px”,color:”#9b7e4a”,textAlign:“center”,marginBottom:“12px”}},“3枚の総合メッセージ”));
cards.forEach((c,i)=>{
const item=el(“div”,{style:{marginBottom:“12px”}});
item.appendChild(el(“div”,{style:{fontSize:“10px”,color:”#c9a84c”,marginBottom:“4px”}},labs[i]+” · “+c.name+(c.isReversed?”（逆）”:””)));
item.appendChild(el(“p”,{style:{fontSize:“11px”,color:”#a09080”,lineHeight:“2”}},c.isReversed?(REVERSED_TEXTS[c.id]||””):c.positive));
box.appendChild(item);
});
d.appendChild(box);
return d;
}

function StepDots(){
const steps=state.mode===3?[“mode”,“select”,“card1”,“card2”,“card3”,“finalize”]:[“mode”,“select”,“interpretation”,“finalize”];
const labels=state.mode===3?[“選択”,“引く”,“1枚目”,“2枚目”,“3枚目”,“まとめ”]:[“選択”,“引く”,“読む”,“相談”];
const ci=steps.indexOf(state.step);
const row=el(“div”,{class:“step-row”});
steps.forEach((s,i)=>{
const active=i===ci,done=i<ci;
const col=el(“div”,{style:{display:“flex”,flexDirection:“column”,alignItems:“center”,gap:“4px”}});
col.appendChild(el(“div”,{class:“sdot”,style:{border:“1px solid “+(active||done?”#c9a84c”:“rgba(201,168,76,.18)”),background:active?“rgba(201,168,76,.18)”:done?“rgba(201,168,76,.08)”:“transparent”,color:active||done?”#c9a84c”:”#2e2638”}},done?“✓”:i+1));
col.appendChild(el(“span”,{style:{fontSize:“7px”,color:active?”#c9a84c”:”#2e2638”,letterSpacing:“1px”}},labels[i]));
row.appendChild(col);
if(i<steps.length-1)row.appendChild(el(“div”,{class:“sline”,style:{background:done?“rgba(201,168,76,.38)”:“rgba(201,168,76,.1)”}}));
});
return row;
}

function render(){
const app=document.getElementById(“app”);
app.innerHTML=””;
const starDiv=el(“div”,{style:{position:“fixed”,inset:“0”,pointerEvents:“none”,zIndex:“0”}});
stars.forEach(s=>starDiv.appendChild(el(“span”,{style:{position:“absolute”,left:s.x,top:s.y,width:s.size+“px”,height:s.size+“px”,borderRadius:“50%”,background:”#fff”,animation:“twinkle “+s.dur+“s “+s.delay+“s ease-in-out infinite alternate”}})));
app.appendChild(starDiv);

const main=el(“div”,{class:“app”});
const container=el(“div”,{class:“container”});

container.appendChild(el(“header”,{class:“header”},
el(“div”,{class:“header-eye”},“✦ Logical Tarot ✦”),
el(“h1”,{class:“header-ttl”},“AI “,el(“em”,null,“Tarot”)),
el(“div”,{class:“header-rule”})
));

if(state.mode)container.appendChild(StepDots());

if(state.step===“mode”){
const panel=el(“div”,{class:“panel”});
panel.appendChild(el(“p”,{style:{textAlign:“center”,fontFamily:“Cormorant Garamond,serif”,fontStyle:“italic”,fontSize:“14px”,color:”#9b7e4a”,marginBottom:“24px”,lineHeight:“1.8”}},”「今、ここ」の直感を言語化しませんか？”));
const grid=el(“div”,{class:“mode-grid”});
const b1=el(“button”,{class:“mode-btn”,onclick:()=>setState({mode:1,step:“select”})},el(“span”,{class:“mode-num”},“I”),el(“span”,{class:“mode-label”},“一枚引き”),el(“span”,{class:“mode-desc”},“今必要なメッセージ”));
const b3=el(“button”,{class:“mode-btn”,onclick:()=>setState({mode:3,step:“select”})},el(“span”,{class:“mode-num”},“III”),el(“span”,{class:“mode-label”},“三枚引き”),el(“span”,{class:“mode-desc”},“過去・現在・未来”));
grid.appendChild(b1);grid.appendChild(b3);
panel.appendChild(grid);
container.appendChild(panel);
}

else if(state.step===“select”){
const deck=shuffle(CARDS.map((_,i)=>i));
const panel=el(“div”,{class:“panel”});
let selected=[];
const countEl=el(“p”,{style:{textAlign:“center”,fontSize:“11px”,color:”#9b7e4a”,letterSpacing:“2px”,marginBottom:“20px”}},“0/”+state.mode+“枚 カードを選んでください”);
const grid=el(“div”,{class:“card-grid”});
deck.forEach((cardIdx,i)=>{
const cell=el(“div”,{class:“cell”,style:{background:“linear-gradient(135deg,#1a0f3a,#0f0a24)”,border:“1px solid rgba(201,168,76,.15)”,fontSize:“10px”,color:“rgba(201,168,76,.3)”}},“✦”);
cell.addEventListener(“click”,()=>{
if(selected.includes(i)||selected.length>=state.mode)return;
selected.push(i);
cell.style.background=“linear-gradient(135deg,#c9a84c22,#c9a84c44)”;
cell.style.border=“1.5px solid #c9a84c”;
cell.style.color=”#c9a84c”;
cell.style.fontSize=“14px”;
cell.textContent=selected.length;
countEl.textContent=selected.length+”/”+state.mode+“枚 カードを選んでください”;
if(selected.length===state.mode){
setTimeout(()=>{
const drawn=selected.map(j=>({…CARDS[deck[j]],isReversed:Math.random()<0.30}));
setState({drawn,idx:0,step:state.mode===1?“interpretation”:“card1”});
},600);
}
});
grid.appendChild(cell);
});
panel.appendChild(countEl);panel.appendChild(grid);
panel.appendChild(el(“p”,{style:{textAlign:“center”,fontSize:“9px”,color:”#3a3040”}},“タップして選択”));
container.appendChild(panel);
}

else if([“interpretation”,“card1”,“card2”,“card3”].includes(state.step)){
const cardIdx={“interpretation”:0,“card1”:0,“card2”:1,“card3”:2}[state.step];
const card=state.drawn[cardIdx];
const total=state.mode;
const panel=el(“div”,{class:“panel”});
panel.appendChild(CardReveal(card,cardIdx,total));
panel.appendChild(el(“div”,{class:“divider”}));
if(state.step===“interpretation”||state.step===“card3”){
panel.appendChild(el(“p”,{style:{fontSize:“10px”,color:”#5a5060”,marginBottom:“4px”}},“Q. このカードを見て、心当たりがあることは？”));
const ta=el(“textarea”,{class:“ref-ta”,placeholder:“気づきを入力…”});
ta.value=state.reflection;
ta.addEventListener(“input”,e=>state.reflection=e.target.value);
panel.appendChild(ta);
panel.appendChild(el(“button”,{class:“btn-primary”,onclick:()=>setState({step:“finalize”})},“分析を完了する”));
} else {
const nextStep={“card1”:“card2”,“card2”:“card3”}[state.step];
const nextLabel={“card1”:“2枚目を見る →”,“card2”:“3枚目を見る →”}[state.step];
panel.appendChild(el(“button”,{class:“btn-primary”,onclick:()=>setState({step:nextStep})},nextLabel));
}
container.appendChild(panel);
}

else if(state.step===“finalize”){
const panel=el(“div”,{class:“panel”});
if(state.mode===3){panel.appendChild(ThreeSummary(state.drawn));panel.appendChild(el(“div”,{class:“divider”}));}
panel.appendChild(el(“div”,{style:{textAlign:“center”,marginBottom:“20px”}},
el(“span”,{style:{fontSize:“36px”,color:”#c9a84c”,display:“block”,marginBottom:“14px”}},“✦”),
el(“h3”,{style:{fontFamily:“Cormorant Garamond,serif”,fontSize:“22px”,fontWeight:“300”,fontStyle:“italic”,color:”#e8dcc8”,marginBottom:“8px”}},“前向きな兆しを現実に。”),
el(“p”,{style:{fontSize:“11px”,color:”#5a4a62”,lineHeight:“2.2”,marginBottom:“24px”,padding:“0 8px”}},“素晴らしい気づきです。プロと一緒に具体的なアクションプランを作りましょう。”)
));
panel.appendChild(el(“p”,{style:{fontSize:“10px”,color:”#5a5060”,marginBottom:“4px”}},state.mode===1?“Q. このカードを見て、心当たりがあることは？”:“Q. 3枚を通じて、気づいたことは？”));
const ta=el(“textarea”,{class:“ref-ta”,placeholder:“気づきを入力…”});
ta.value=state.reflection;
ta.addEventListener(“input”,e=>state.reflection=e.target.value);
panel.appendChild(ta);
panel.appendChild(el(“button”,{class:“btn-line”,onclick:()=>{
const names=state.drawn.map(c=>c.name+(c.isReversed?”（逆）”:””)).join(” / “);
const text=”【AIタロット鑑定結果】
カード：”+names+”
気づき：”+ta.value+”
詳しく相談したいです。”;
navigator.clipboard.writeText(text).catch(()=>{});
window.open(LINE_URL,”_blank”);
}},“公式LINEで相談を開始”));
panel.appendChild(el(“p”,{style:{fontSize:“9px”,color:”#2a2232”,textAlign:“center”,lineHeight:“1.8”,marginTop:“10px”}},”※ボタンを押すと結果がコピーされます。”));
panel.appendChild(el(“button”,{class:“btn-ghost”,onclick:()=>setState({step:“mode”,mode:null,drawn:[],idx:0,reflection:””})},“↩ 最初に戻る”));
container.appendChild(panel);
}

main.appendChild(container);
main.appendChild(el(“footer”,{class:“footer”},“© 2026 LOGICAL TAROT COUNSELING · DAISUKE”));
app.appendChild(main);
}

render();
})();
</script>

</body>
</html>
